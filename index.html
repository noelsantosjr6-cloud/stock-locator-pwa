<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Stock Locator - PWA Enhanced (6-column CSV + two-field search)</title>

<!-- PWA manifest -->
<link rel="manifest" href="manifest.json">

<!-- iOS meta for home screen experience -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">

<!-- Optional: provide an iOS home-screen icon if you add real icons -->
<!-- <link rel="apple-touch-icon" href="icons/apple-touch-icon.png"> -->

<style>
:root{
--bg: #f5f5f5;
--panel: #fff;
--text: #333;
--muted: #666;
--accent: #2e8b57;
--card: #fff;
}
[data-theme="dark"]{
--bg: #0e0f13;
--panel: #171a1f;
--text: #eaeaea;
--muted: #aaa;
--accent: #4ecdc4;
--card: #1e1f24;
}
*{box-sizing:border-box}
html, body { height: 100%; }
body{ margin:0; font-family: Arial, sans-serif; background: var(--bg); color: var(--text); }
header{padding:12px 14px;background: var(--panel);border-bottom:1px solid var(--accent);display:flex;gap:12px;align-items:center}
header strong{font-size:16px}
main{padding:14px}
.card{background:var(--panel);border:1px solid var(--accent);border-radius:8px;padding:12px;margin-bottom:12px;box-shadow:0 1px 2px rgba(0,0,0,.05)}
.row{display:flex;gap:12px;flex-wrap:wrap;align-items:center}
label{font-weight:600}
input[type="file"]{font-size:14px}
input[type="text"]{padding:8px 10px;border:1px solid #ccc;border-radius:6px;width:100%;max-width:340px}
button{color:#fff;border:0;padding:10px 14px;border-radius:6px;cursor:pointer}
button.accent{ background: var(--accent); }
button.fixed{ background: #2e8b57; } /* fixed color for primary actions */
button.secondary{ background:#666; }

/* Right-aligned button area (always on the right) */
.controlsRow { display:flex; gap:12px; align-items:flex-start; width:100%; }
.leftCol { flex:1 1 auto; min-width:0; display:flex; flex-direction:column; gap:8px; }
.rightCol { display:flex; align-items:center; justify-content:flex-end; white-space:nowrap; }

/* Keep the 3 primary action buttons on one line by default, wrap on small screens */
.btnGroup { display:flex; gap:8px; align-items:center; }

/* Two-field search label sizing (keep same font size as the Part Number label) */
.orSupplierLine { margin:6px 0 6px 0; font-weight:600; font-size:16px; color: var(--muted); }

/* Mobile tweaks: stack controls nicely */
@media (max-width: 700px){
.controlsRow { flex-direction: column; align-items: stretch; }
.rightCol { justify-content: flex-start; }
.leftCol { order: 0; }
.btnGroup { width: 100%; justify-content: flex-end; }
}

/* Responsive table: better mobile experience */
.tableWrap { overflow-x: auto; -webkit-overflow-scrolling: touch; }
table{ width: 100%; border-collapse: collapse; table-layout: fixed; min-width: 700px; }
th,td{ border:1px solid #ddd; padding:8px 8px; text-align:left; white-space: normal; word-wrap: break-word; }
th{ background:#f0f0f0; }
[data-theme="dark"] th { color: #000; } /* readable headers in dark mode */
.muted{color:var(--muted);font-size:12px}
#scannerOverlay{position:fixed;inset:0;background:rgba(0,0,0,.7);display:none;justify-content:center;align-items:center;z-index:9999}
#scannerBox{width:90%;max-width:600px;background:#111;border-radius:12px;padding:12px;position:relative}
#scannerVideo{width:100%;height:auto;border-radius:6px;background:#000}
#scannerClose{position:absolute;top:6px;right:6px;background:#333;color:#fff;border:0;border-radius:6px;padding:6px 10px;cursor:pointer}
@media (max-width: 700px){
main{padding:8px}
.row{flex-direction:column}
}
input:focus, button:focus{outline: none; box-shadow: 0 0 0 2px rgba(46,139,87,.25);}
input:focus{ border-color: var(--accent); }
</style>
</head>
<body>

<header>
<strong>Stock Locator</strong>
<div class="muted" style="margin-left:auto; padding-right:8px"></div>
<button id="clearBtn" class="secondary" title="Clear loaded data" style="margin-left:8px">Clear data</button>
</header>

<main>
<section class="card" aria-label="data controls">
<div class="controlsRow" style="gap:12px;align-items:flex-start">
<!-- Left side: CSV input + searches -->
<div class="leftCol" style="min-width:0;">
<div>
<label for="fileInput" class="label">CSV data (Dept, Warehouse, Supplier Reference, Part Number, Physical Inventory, SubLocation)</label><br/>
<input id="fileInput" type="file" accept=".csv" />
</div>

<div style="display:flex; gap:12px; align-items:flex-start;">
<div style="flex:1 1 auto; min-width:0;">
<label for="searchBox" class="label">Search Part Number</label><br/>
<input id="searchBox" type="text" placeholder="e.g., TPMT 2-1 or TPMT 2-1*" />
<!-- Keep font size of the line consistent with the label above -->
<div class="orSupplierLine">or Supplier Reference</div>
<input id="supplierBox" type="text" placeholder="Supplier Reference" />
</div>
</div>
</div>

<!-- Right side: fixed-position action buttons on the right -->
<div class="rightCol" aria-label="action buttons">
<div class="btnGroup" style="gap:8px; align-items:stretch;">
<button id="scanBtn" class="fixed" title="Scan barcode using camera">Scan Barcode</button>
<button id="syncBtn" class="fixed" title="Sync/export data now (AX)">Sync Now</button>
<button id="exportBtn" class="fixed" title="Export currently visible rows to CSV">Export filtered CSV</button>
</div>
</div>
</div>

<div class="row" style="gap:12px;align-items:center;margin-top:6px">
<label for="accentColor" title="Accent color (theme color)">Accent color</label>
<input id="accentColor" type="color" value="#2e8b57" />
<label for="themeToggle" style="margin-left:8px;">Dark mode</label>
<input id="themeToggle" type="checkbox" />
<span id="themeStatus" class="muted" style="margin-left:8px"></span>
</div>
<div id="status" class="muted" style="margin-top:8px">No data loaded yet. Load a CSV to begin.</div>

<!-- A tiny helper button to load sample data if you want to demo quickly -->
<div style="margin-top:6px;">
<button id="loadSampleBtn" class="secondary" style="background:#777; padding:8px 12px; border-radius:6px;">Load sample demo data</button>
</div>
</section>

<section class="card" aria-label="results">
<h3 style="margin:0 0 8px 0">Results (Quantity > 0)</h3>

<div class="tableWrap">
<table id="resultsTable" aria-label="stock results">
<thead>
<tr>
<th>Dept</th>
<th>Warehouse</th>
<th>Supplier Reference</th>
<th>Part Number</th>
<th>Physical Inventory</th>
<th>SubLocation</th>
</tr>
</thead>
<tbody><!-- rows injected here --></tbody>
</table>
</div>

<div id="noResults" class="muted" style="display:none;margin-top:6px">No results match your search.</div>
<div id="summary" class="muted" style="margin-top:6px"></div>
<div id="debug" class="muted" style="margin-top:6px; display:none"></div>
</section>
</main>

<!-- Barcode scanner overlay (hidden by default) -->
<div id="scannerOverlay" aria-label="barcode scanner" role="dialog" aria-modal="true">
<div id="scannerBox">
<button id="scannerClose">Close</button>
<video id="scannerVideo" autoplay playsinline></video>
</div>
</div>

<script>
// Sample data for quick demo (to be replaced by a real CSV)
var SAMPLE_DATA = [
{ dept: '01', warehouse: 'WH-A', supplierRef: 'SUP-001', part: 'PKG-1001', sub: 'LOC-01', qty: 5 },
{ dept: '02', warehouse: 'WH-B', supplierRef: 'SUP-002', part: 'PKG-2002', sub: 'LOC-02', qty: 3 },
{ dept: '03', warehouse: 'WH-C', supplierRef: 'SUP-003', part: 'PKG-3003', sub: 'LOC-03', qty: 8 }
];

var allData = [];
var filteredData = [];

var fileInput = document.getElementById('fileInput');
var searchBox = document.getElementById('searchBox');
var supplierBox = document.getElementById('supplierBox');
var resultsTableBody = document.querySelector('#resultsTable tbody');
var noResults = document.getElementById('noResults');
var status = document.getElementById('status');
var summary = document.getElementById('summary');
var clearBtn = document.getElementById('clearBtn');
var scanBtn = document.getElementById('scanBtn');
var syncBtn = document.getElementById('syncBtn');
var exportBtn = document.getElementById('exportBtn');
var accentColor = document.getElementById('accentColor');
var themeToggle = document.getElementById('themeToggle');
var themeStatus = document.getElementById('themeStatus');
var scannerOverlay = document.getElementById('scannerOverlay');
var scannerVideo = document.getElementById('scannerVideo');
var scannerClose = document.getElementById('scannerClose');
var loadSampleBtn = document.getElementById('loadSampleBtn');
var loadSampleBtnDeprecatedNote = ''; // placeholder if you want

var AX_SYNC_URL = ''; // Optional: set your AX endpoint here

// Helpers
function escapeHtml(text){
if (text == null) return '';
return String(text)
.replace(/&/g, '&amp;')
.replace(/</g, '&lt;')
.replace(/>/g, '&gt;')
.replace(/"/g, '&quot;')
.replace(/'/g, '&#39;');
}

// Robust 6-column CSV parsing (Dept, Warehouse, Supplier Reference, Part Number, Physical Inventory, SubLocation)
function parseCSVLine(line){
var res = [];
var cur = '';
var inQuotes = false;
for (var i = 0; i < line.length; i++){
var ch = line[i];
if (inQuotes){
if (ch === '"'){
if (line[i+1] === '"'){ cur += '"'; i++; } else { inQuotes = false; }
} else { cur += ch; }
} else {
if (ch === '"'){ inQuotes = true; }
else if (ch === ','){ res.push(cur); cur = ''; }
else { cur += ch; }
}
}
res.push(cur);
return res;
}

function parseCSV(text){
var lines = text.split(/\r?\n/);
var cleaned = [];
for (var i = 0; i < lines.length; i++){
var l = lines[i];
if (l && l.trim().length > 0) cleaned.push(l);
}
if (cleaned.length < 2) return [];

var headers = parseCSVLine(cleaned[0]);
var lower = [];
for (var j = 0; j < headers.length; j++){
lower.push((headers[j] || '').toString().toLowerCase().trim());
}

// Detect indexes for: Dept, Warehouse, Supplier Reference, Part, Physical Inventory, SubLocation
var iDept = -1, iW = -1, iSR = -1, iP = -1, iQ = -1, iS = -1;
for (var k = 0; k < lower.length; k++){
var h = lower[k];
if (iDept === -1 && (h.indexOf('dept') !== -1 || h.indexOf('department') !== -1)) iDept = k;
if (iW === -1 && h.indexOf('warehouse') !== -1) iW = k;
if (iSR === -1 && h.indexOf('supplier') !== -1 && h.indexOf('reference') !== -1) iSR = k;
if (iP === -1 && h.indexOf('part') !== -1) iP = k;
if (iQ === -1 && (h.indexOf('physical') !== -1 || h.indexOf('inventory') !== -1 || h.indexOf('qty') !== -1 || h.indexOf('quantity') !== -1)) iQ = k;
if (iS === -1 && (h.indexOf('sub') !== -1 || h.indexOf('sublocation') !== -1)) iS = k;
}

// Fallbacks if header naming is slightly different
if (iDept === -1){ for (var t=0; t<lower.length; t++){ if (lower[t].indexOf('dept') !== -1 || lower[t].indexOf('department') !== -1) { iDept = t; break; } } }
if (iW === -1){ for (var t2=0; t2<lower.length; t2++){ if (lower[t2].indexOf('warehouse') !== -1) { iW = t2; break; } } }
if (iSR === -1){ for (var t3=0; t3<lower.length; t3++){ if (lower[t3].indexOf('supplier') !== -1 && lower[t3].indexOf('reference') !== -1) { iSR = t3; break; } } }
if (iP === -1){ for (var t4=0; t4<lower.length; t4++){ if (lower[t4].indexOf('part') !== -1) { iP = t4; break; } } }
if (iQ === -1){ for (var t5=0; t5<lower.length; t5++){ if (lower[t5].indexOf('inventory') !== -1 || lower[t5].indexOf('qty') !== -1) { iQ = t5; break; } } }
if (iS === -1){ for (var t6=0; t6<lower.length; t6++){ if (lower[t6].indexOf('sub') !== -1 || lower[t6].indexOf('sublocation') !== -1) { iS = t6; break; } } }

if (iDept === -1 || iW === -1 || iSR === -1 || iP === -1 || iQ === -1 || iS === -1){
console.log('CSV header issue. Detected indexes:', {dept:iDept, ware:iW, src:iSR, part:iP, qty:iQ, sub:iS}, 'Headers:', headers);
alert('CSV headers not detected correctly. Check console for details.');
return [];
}

var rows = [];
for (var r = 1; r < cleaned.length; r++){
var cols = parseCSVLine(cleaned[r]);
var dept = cols[iDept] || '';
var w = cols[iW] || '';
var sr = cols[iSR] || '';
var p = cols[iP] || '';
var s = cols[iS] || '';
var qRaw = cols[iQ] || '0';
var q = parseInt(qRaw.toString().replace(/[^0-9.\-]/g, ''), 10);
if (isNaN(q)) q = 0;
rows.push({ dept: dept, warehouse: w, supplierRef: sr, part: p, sub: s, qty: q });
}
return rows;
}

// Simple case-insensitive contains
function matchesQuery(value, query){
var q = (query || '').toString().trim();
if (q.length === 0) return true;
var v = (value || '').toString().toLowerCase().trim();
return v.indexOf(q.toLowerCase()) !== -1;
}

// Render table based on two searches
function renderTable(){
var partQuery = (searchBox.value || '').toString().trim();
var supplierQuery = (supplierBox.value || '').toString().trim();

var rows = [];
for (var i = 0; i < allData.length; i++){
var row = allData[i];
if (!row) continue;
if (row.qty <= 0) continue;

var partOK = matchesQuery(row.part, partQuery);
var suppOK = matchesQuery(row.supplierRef, supplierQuery);

if (partOK && suppOK){
rows.push(row);
}
}
filteredData = rows;

// Build table: Dept, Warehouse, Supplier Reference, Part Number, Physical Inventory, SubLocation
resultsTableBody.innerHTML = '';
for (var j = 0; j < rows.length; j++){
var r = rows[j];
var tr = document.createElement('tr');
tr.innerHTML = ''
+ '<td>' + escapeHtml(r.dept) + '</td>'
+ '<td>' + escapeHtml(r.warehouse) + '</td>'
+ '<td>' + escapeHtml(r.supplierRef) + '</td>'
+ '<td>' + escapeHtml(r.part) + '</td>'
+ '<td>' + r.qty + '</td>'
+ '<td>' + escapeHtml(r.sub) + '</td>';
resultsTableBody.appendChild(tr);
}

noResults.style.display = (rows.length === 0) ? 'block' : 'none';
summary.textContent = 'Records: ' + rows.length;
}

// Load CSV file
function loadCSVFile(file){
if (!file) return;
var reader = new FileReader();
reader.onload = function(e){
var text = e.target.result;
var rows = parseCSV(text);
if (rows.length > 0){
allData = rows;
renderTable();
status.textContent = 'Loaded ' + rows.length + ' records from CSV';
localStorage.setItem('sl_lastData', JSON.stringify(rows));
// If user uploaded, save accent / theme defaults too
localStorage.setItem('sl_accent', accentColor.value);
} else {
status.textContent = 'No valid rows found in CSV';
allData = [];
filteredData = [];
renderTable();
}
};
reader.onerror = function(){
status.textContent = 'Error reading CSV file';
};
reader.readAsText(file);
}

// Clear data
clearBtn.addEventListener('click', function(){
allData = [];
filteredData = [];
resultsTableBody.innerHTML = '';
searchBox.value = '';
supplierBox.value = '';
// Reset the file input so the user must re-load a CSV after clearing
fileInput.value = '';
status.textContent = 'Data cleared';
summary.textContent = 'Records: 0';
noResults.style.display = 'none';
localStorage.removeItem('sl_lastData');
localStorage.removeItem('sl_last_accent');
localStorage.removeItem('sl_theme');
renderTable();
});

// File input change
fileInput.addEventListener('change', function(e){
var file = e.target.files && e.target.files[0];
if (file){
loadCSVFile(file);
}
});

// Live search
searchBox.addEventListener('input', function(){
renderTable();
});
supplierBox.addEventListener('input', function(){
renderTable();
});

// Export CSV (filtered data)
exportBtn.addEventListener('click', function(){
var lines = [];
lines.push('Dept,Warehouse,Supplier Reference,Part Number,Physical Inventory,SubLocation');
for (var i = 0; i < filteredData.length; i++){
var it = filteredData[i];
lines.push([it.dept, it.warehouse, it.supplierRef, it.part, it.qty, it.sub].join(','));
}
var blob = new Blob([lines.join('\n')], {type: 'text/csv;charset=utf-8;'});
var url = URL.createObjectURL(blob);
var a = document.createElement('a');
a.href = url;
a.download = 'stocks_filtered.csv';
document.body.appendChild(a);
a.click();
document.body.removeChild(a);
URL.revokeObjectURL(url);
});

// Accent color and theme
function hexToRgba(hex, alpha){
var r=0,g=0,b=0;
if (hex.charAt(0) === '#') hex = hex.substring(1);
if (hex.length === 3){
r = parseInt(hex.charAt(0) + hex.charAt(0), 16);
g = parseInt(hex.charAt(1) + hex.charAt(1), 16);
b = parseInt(hex.charAt(2) + hex.charAt(2), 16);
} else if (hex.length === 6){
r = parseInt(hex.substring(0,2), 16);
g = parseInt(hex.substring(2,4), 16);
b = parseInt(hex.substring(4,6), 16);
}
return 'rgba(' + r + ',' + g + ',' + b + ',' + alpha + ')';
}

accentColor.addEventListener('input', function(){
document.documentElement.style.setProperty('--accent', accentColor.value);
// Soft tint background to reflect accent
document.body.style.backgroundColor = hexToRgba(accentColor.value, 0.08);
localStorage.setItem('sl_accent', accentColor.value);
});

// Theme toggle
themeToggle.addEventListener('change', function(){
if (themeToggle.checked){
document.documentElement.setAttribute('data-theme', 'dark');
} else {
document.documentElement.removeAttribute('data-theme');
}
localStorage.setItem('sl_theme', themeToggle.checked ? 'dark' : 'light');
themeStatus.textContent = themeToggle.checked ? 'Dark mode' : 'Light mode';
});

// Init (load data + apply saved prefs)
(function init(){
// Apply saved accent
var savedAccent = localStorage.getItem('sl_accent');
if (savedAccent) {
accentColor.value = savedAccent;
document.documentElement.style.setProperty('--accent', savedAccent);
document.body.style.backgroundColor = hexToRgba(savedAccent, 0.08);
}

// Apply saved theme
var savedTheme = localStorage.getItem('sl_theme');
if (savedTheme === 'dark'){
themeToggle.checked = true;
document.documentElement.setAttribute('data-theme', 'dark');
} else if (savedTheme === 'light'){
themeToggle.checked = false;
document.documentElement.removeAttribute('data-theme');
} else {
// No saved theme: try to respect system preference
if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches){
themeToggle.checked = true;
document.documentElement.setAttribute('data-theme', 'dark');
}
}

// Load last CSV if available
var last = localStorage.getItem('sl_lastData');
if (last){
try{
allData = JSON.parse(last);
renderTable();
status.textContent = 'Loaded saved CSV data';
} catch(e){
// ignore parse error
}
}

// If no data yet, load a small sample dataset for immediate use
if (!allData || allData.length === 0){
allData = SAMPLE_DATA.slice();
renderTable();
status.textContent = 'Loaded sample data (no CSV uploaded yet). You can upload a CSV anytime to replace it.';
}

// Initialize scanner overlay as hidden
scannerOverlay.style.display = 'none';
})();

// Optional: scanner placeholder (basic BarcodeDetector usage)
// We implement a simple barcode scanner flow if browser supports BarcodeDetector.
// It will attempt to read a code from the video frames and fill searchBox.
var videoStream = null;
var detector = null;
var streamActive = false;

scanBtn.addEventListener('click', function(){
// Check support
if (!('mediaDevices' in navigator) || !navigator.mediaDevices.getUserMedia){
alert('Camera access is not supported in this browser.');
return;
}

// Show overlay
scannerOverlay.style.display = 'flex';
// Start camera
navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } })
.then(function(stream){
videoStream = stream;
scannerVideo.srcObject = stream;
scannerVideo.play();
streamActive = true;

if ('BarcodeDetector' in window){
detector = new BarcodeDetector({ formats: ['code_128','ean_13','ean_8','upc_a','upc_e','qr_code'] });
// Prepare canvas to pull frames
var canvas = document.createElement('canvas');
var ctx = canvas.getContext('2d');
canvas.width = 640;
canvas.height = 480;

function tick(){
if (!streamActive) return;
try{
ctx.drawImage(scannerVideo, 0, 0, canvas.width, canvas.height);
detector.detect(canvas)
.then(barcodes => {
if (barcodes && barcodes.length > 0){
var code = barcodes[0].rawValue || barcodes[0].displayValue;
if (code){
searchBox.value = code;
renderTable();
stopScanner();
return;
}
}
requestAnimationFrame(tick);
})
.catch(function(){ requestAnimationFrame(tick); });
} catch(err){
requestAnimationFrame(tick);
}
}
requestAnimationFrame(tick);
} else {
// BarcodeDetector not supported: user can type manually or use QR workaround
alert('Barcode scanning not supported in this browser. You can still type a value into the search box.');
}
})
.catch(function(err){
console.error(err);
alert('Unable to access camera. Please allow camera permissions.');
});
});

function stopScanner(){
streamActive = false;
if (videoStream){
videoStream.getTracks().forEach(function(t){ t.stop(); });
}
scannerVideo.srcObject = null;
scannerOverlay.style.display = 'none';
}

// Close scanner button
scannerClose.addEventListener('click', function(){
stopScanner();
});

// Simple cleanup if user closes overlay by clicking outside (optional)
scannerOverlay.addEventListener('click', function(e){
if (e.target === scannerOverlay){
stopScanner();
}
});

// Load sample data button (for quick demo)
loadSampleBtn.addEventListener('click', function(){
allData = SAMPLE_DATA.slice();
renderTable();
status.textContent = 'Loaded sample data (demo). Upload a CSV to replace it.';
localStorage.setItem('sl_lastData', JSON.stringify(allData));
});

// End of script
</script>

</body>
</html>
